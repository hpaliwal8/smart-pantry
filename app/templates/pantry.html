{% extends "base.html" %}
{% block content %}
<section class="page">
  <div class="page-head">
    <h1>Pantry</h1>
    <p class="muted">What's in your kitchen right now.</p>
  </div>

  <form id="pantry-add" class="row-form">
    <input name="name" placeholder="Item name (e.g. chicken breast)" required />
    <input name="quantity" type="number" min="0" step="0.5" placeholder="Qty" value="1" />
    <input name="unit" placeholder="Unit" />
    <input name="category" placeholder="Category" />
    <input name="expiry_date" type="date" />
    <button type="submit">Add</button>
  </form>

  <div id="pantry-list" class="list"></div>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/pantry.js') }}"></script>
{% endblock %}
